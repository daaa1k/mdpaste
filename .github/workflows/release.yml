name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        run: |
          gh release view "${{ github.ref_name }}" 2>/dev/null || \
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mdpaste-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mdpaste-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mdpaste-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cmake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/mdpaste"
          [[ "$RUNNER_OS" == "Windows" ]] && src="${src}.exe"
          cp "$src" "${{ matrix.artifact }}"

      - name: Upload to release
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.artifact }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
