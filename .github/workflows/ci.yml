name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: daaa1k
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Use cachix watch-exec to explicitly capture and push all
      # store paths created during the build to the Cachix cache.
      - name: nix build
        run: cachix watch-exec daaa1k -- nix build

      # Flake checks reuse cached artifacts from the build above.
      - name: nix flake check
        run: nix flake check
