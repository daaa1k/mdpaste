name: Nix

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flake-check:
    name: nix flake check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: daaa1k
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Build the package first so that the derivation (and its
      # dependencies) are pushed to Cachix by the post-build hook.
      - name: nix build
        run: nix build

      # Run all flake checks (build, fmt, clippy, tests).
      # Cached build artifacts from the previous step are reused.
      - name: nix flake check
        run: nix flake check
