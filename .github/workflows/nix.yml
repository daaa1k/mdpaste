name: Nix

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flake-check:
    name: nix flake check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: daaa1k
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Run all flake checks (build, clippy, tests).
      # The checks derivations are built and stored in the Nix store here.
      - name: nix flake check
        run: nix flake check

      # Push the already-built check outputs and their closures to Cachix.
      # We reference .#checks.${SYSTEM}.* (not .#packages) to avoid any
      # rebuilds — these exact derivations were just built by nix flake check.
      - name: Push to Cachix
        run: |
          SYSTEM=$(nix eval --raw --impure --expr 'builtins.currentSystem')
          nix build \
            ".#checks.${SYSTEM}.mdpaste" \
            ".#checks.${SYSTEM}.mdpaste-clippy" \
            ".#checks.${SYSTEM}.mdpaste-test" \
            --no-link --print-out-paths \
            | xargs nix-store -qR \
            | cachix push daaa1k
