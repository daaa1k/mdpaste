name: Nix

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flake-check:
    name: nix flake check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      # Cache the Nix store via GitHub Actions cache (free).
      # gc-max-store-size is intentionally omitted for both platforms.
      # With a 2G limit, GC deleted critical artifacts (rustc, cargo,
      # cargoArtifacts, vendor sources) making warm-cache builds slower
      # than cold builds. The full store is ~1GB (Linux) / ~700MB (macOS)
      # compressed, well within GitHub's 10GB cache limit.
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-v2-${{ runner.os }}-${{ hashFiles('**/flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-v2-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-v2-${{ runner.os }}-
          purge-last-accessed: P3DT0H
          purge-primary-key: never

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: daaa1k
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: ".*"

      # Build the package so cargoArtifacts and the final binary
      # are in the store before flake check runs.
      - name: nix build
        run: nix build

      # Run all checks (fmt, clippy, tests).
      # Reuses cargoArtifacts cached by the build above.
      - name: nix flake check
        run: nix flake check
