name: Nix

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flake-check:
    name: nix flake check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: daaa1k
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Build the package and run all flake checks (clippy, tests).
      # cachix-action automatically pushes newly built derivations to the cache.
      - name: nix flake check
        run: nix flake check
