name: Nix

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flake-check:
    name: nix flake check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: daaa1k
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Run all flake checks (build, clippy, tests).
      - name: nix flake check
        run: nix flake check

      # Explicitly push the built package and its full closure to Cachix.
      # cachix-action's automatic push may not capture all paths when using
      # DeterminateSystems nix-installer, so we push explicitly here.
      - name: Push to Cachix
        run: |
          nix build .#mdpaste --no-link --print-out-paths \
            | xargs nix-store -qR \
            | cachix push daaa1k
