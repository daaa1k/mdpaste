name: Nix

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flake-check:
    name: nix flake check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install devenv.sh
        uses: cachix/devenv-action@v1
        with:
          cachixName: daaa1k
          cachixAuthToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Build the package and run all flake checks (clippy, tests).
      # devenv-action automatically pushes newly built derivations to the cache.
      - name: nix flake check
        run: nix flake check
