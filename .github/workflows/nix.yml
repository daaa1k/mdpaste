name: Nix

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flake-check:
    name: nix flake check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      # GitHub Actions cache as Nix substituter.
      # Caches large compiled artifacts (cargoArtifacts, final binary) that
      # Cachix free-plan storage limits prevent from being stored.
      # PRs automatically restore from the base branch cache.
      - name: Set up magic-nix-cache
        uses: DeterminateSystems/magic-nix-cache-action@v9

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: daaa1k
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # Push small store paths (cargo vendor sources, crane hooks) to
          # Cachix; large compiled artifacts are handled by magic-nix-cache.
          pushFilter: ".*"

      # Build the package so cargoArtifacts and the final binary
      # are in the store before flake check runs.
      - name: nix build
        run: nix build

      # Run all checks (fmt, clippy, tests).
      # Reuses cargoArtifacts cached by the build above.
      - name: nix flake check
        run: nix flake check
