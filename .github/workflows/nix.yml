name: Nix

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flake-check-linux:
    name: nix flake check (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: daaa1k
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # Push all store paths built during the job, including
          # cargoArtifacts (compiled Cargo deps) for CI cache speedup.
          pushFilter: ".*"

      # Build the package so cargoArtifacts and the final binary
      # are in the store before flake check runs.
      - name: nix build
        run: nix build

      # Run all checks (fmt, clippy, tests).
      # Reuses cargoArtifacts cached by the build above.
      - name: nix flake check
        run: nix flake check

  flake-check-macos:
    name: nix flake check (macos-latest)
    runs-on: macos-latest
    # Only run on pushes to main, not on every PR, to keep PR checks fast
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Configure Cachix
        uses: cachix/cachix-action@v15
        with:
          name: daaa1k
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: ".*"

      - name: nix build
        run: nix build

      - name: nix flake check
        run: nix flake check
